<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作负载 | CNAP</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="i-grid" viewBox="0 0 24 24"><rect x="4" y="4" width="5" height="5" rx="1"/><rect x="15" y="4" width="5" height="5" rx="1"/><rect x="4" y="15" width="5" height="5" rx="1"/><rect x="15" y="15" width="5" height="5" rx="1"/></symbol>
    <symbol id="i-home" viewBox="0 0 24 24"><path d="m3 11 9-7 9 7v9H3z"/><path d="M9 20v-6h6v6"/></symbol>
    <symbol id="i-calendar" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></symbol>
    <symbol id="i-apps" viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></symbol>
    <symbol id="i-leaf" viewBox="0 0 24 24"><path d="M20 4C11 4 5 8 5 14c0 3.3 2.7 6 6 6 6 0 9-6 9-16Z"/><path d="M4 20c3-4 7-7 12-10"/></symbol>
    <symbol id="i-clipboard" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="16" rx="2"/><path d="M9 5V3h6v2M8 11h8M8 15h8"/></symbol>
    <symbol id="i-stack" viewBox="0 0 24 24"><path d="m12 3 8 4-8 4-8-4zM4 12l8 4 8-4M4 16l8 4 8-4"/></symbol>
    <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M5 21c0-4 3-7 7-7s7 3 7 7"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="m16 16 4 4"/></symbol>
    <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0 1 5"/><path d="M20 4v7h-7"/></symbol>
    <symbol id="i-power" viewBox="0 0 24 24"><path d="M12 3v9"/><path d="M7.1 5.9a8 8 0 1 0 9.8 0"/></symbol>
    <symbol id="i-unfold" viewBox="0 0 24 24"><path d="M4 7h11M4 12h16M4 17h11"/><path d="m16 5 4 2-4 2M16 15l4 2-4 2"/></symbol>
    <symbol id="i-more" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="19" cy="12" r="1" fill="currentColor"/></symbol>
    <symbol id="i-chevron-down" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></symbol>
    <symbol id="i-chevron-up" viewBox="0 0 24 24"><path d="m6 15 6-6 6 6"/></symbol>
    <symbol id="i-chevron-right" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></symbol>
    <symbol id="i-bell" viewBox="0 0 24 24"><path d="M18 10a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 22h4"/></symbol>
    <symbol id="i-headphones" viewBox="0 0 24 24"><path d="M4 14v-2a8 8 0 0 1 16 0v2"/><path d="M4 14h3v5H5a1 1 0 0 1-1-1zM20 14h-3v5h2a1 1 0 0 0 1-1z"/></symbol>
    <symbol id="i-cpu" viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="1"/><path d="M9 3v4M15 3v4M9 17v4M15 17v4M3 9h4M3 15h4M17 9h4M17 15h4"/></symbol>
    <symbol id="i-memory" viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="10" rx="2"/><path d="M8 7V5M12 7V5M16 7V5M8 17v2M12 17v2M16 17v2M8 11h8"/></symbol>
  </svg>
  <header class="global-header">
    <button class="app-launcher" aria-label="产品菜单" title="产品菜单"><svg><use href="#i-grid"/></svg></button>
    <a class="brand" href="#" aria-label="返回 CNAP 首页"><span class="brand-gem">◆</span><strong>CNAP</strong></a>
    <nav class="breadcrumbs" aria-label="当前位置">
      <button class="crumb-home" data-context="home"><svg><use href="#i-home"/></svg>CNAP</button><em>/</em>
      <button data-context="account">默认账号<svg class="chevron"><use href="#i-chevron-down"/></svg></button><em>/</em>
      <button data-context="application">Payment-api<svg class="chevron"><use href="#i-chevron-down"/></svg></button><em>/</em>
      <button data-context="environment"><span class="env-tag">生产</span>prod-cn-bj<svg class="chevron"><use href="#i-chevron-down"/></svg></button><em>/</em>
      <button data-context="cluster">imeonline<svg class="chevron"><use href="#i-chevron-down"/></svg></button>
    </nav>
    <div class="header-tools"><label class="header-search"><img class="figma-icon" src="./assets/figma-icon-library-56-38920/image_43.png" alt=""><input aria-label="全局搜索" placeholder="搜索"><kbd>⌘K</kbd></label><button class="header-icon" aria-label="通知" title="通知"><img class="figma-icon" src="./assets/figma-icon-library-56-38920/image_41.png" alt=""></button><button class="user-menu" aria-label="账户菜单" title="账户菜单"><span>G</span><svg><use href="#i-chevron-down"/></svg></button><button class="header-icon" id="headerMoreBtn" aria-label="更多"><svg><use href="#i-more"/></svg></button></div>
  </header>

  <div class="shell">
    <aside class="primary-nav" aria-label="产品导航">
      <nav>
        <button data-primary-nav="home" aria-label="主页" title="主页"><img src="./assets/figma-icon-library-56-38920/image_44.png" alt=""><span>主页</span></button>
        <button data-primary-nav="affairs" aria-label="事务" title="事务"><img src="./assets/figma-icon-library-56-38920/image_45.png" alt=""><span>事务</span></button>
        <span class="primary-divider" aria-hidden="true"><img src="./assets/figma-navigation-4-1319/image_3.png" alt=""></span>
        <button class="active" data-primary-nav="apps" aria-label="应用" title="应用"><img src="./assets/figma-primary-app-selected-56-39117/image_1.png" alt=""><span>应用</span></button>
        <button data-primary-nav="environment" aria-label="环境" title="环境"><img src="./assets/figma-icon-library-56-38920/image_47.png" alt=""><span>环境</span></button>
        <button class="primary-replaceable" data-primary-nav="changes" data-default-nav="changes" aria-label="变更" title="变更"><img src="./assets/figma-icon-library-56-38920/image_48.png" alt=""><span>变更</span></button>
        <button class="compact-overflow-item" data-primary-nav="resources" aria-label="资源" title="资源"><img src="./assets/figma-icon-library-56-38920/image_49.png" alt=""><span>资源</span></button>
        <button class="compact-overflow-item" data-primary-nav="account" aria-label="账户" title="账户"><img src="./assets/figma-icon-library-56-38920/image_50.png" alt=""><span>账户</span></button>
        <button id="primaryMoreBtn" class="more-nav" aria-label="更多导航" title="更多导航"><img src="./assets/figma-icon-library-56-38920/image_51.png" alt=""><span>更多</span></button>
      </nav>
      <div class="primary-bottom"><img src="./assets/figma-navigation-4-1319/image_40.png" alt="通知、设置、更新日志和帮助入口"></div>
    </aside>

    <aside class="secondary-nav" id="secondaryNav" aria-label="应用导航">
      <header><p class="secondary-title">应用</p></header>
      <nav>
        <button class="active" data-app-nav="workload"><img src="./assets/figma-navigation-4-1319/image_45.png" alt=""><span>工作负载</span></button>
        <button data-app-nav="exposure"><img src="./assets/figma-navigation-4-1319/image_46.png" alt=""><span>服务暴露</span></button>
        <button data-app-nav="logs"><img src="./assets/figma-navigation-4-1319/image_47.png" alt=""><span>日志</span></button>
        <button data-app-nav="terminal"><img src="./assets/figma-navigation-4-1319/image_48.png" alt=""><span>终端</span></button>
        <button data-app-nav="monitor"><img src="./assets/figma-navigation-4-1319/image_49.png" alt=""><span>监控</span></button>
        <button data-app-nav="runtime"><img src="./assets/figma-navigation-4-1319/image_50.png" alt=""><span>运行配置</span></button>
        <button data-app-nav="settings"><img src="./assets/figma-navigation-4-1319/image_51.png" alt=""><span>应用设置</span></button>
      </nav>
      <button id="secondaryCollapseBtn" class="secondary-collapse" aria-label="收起二级导航" title="收起二级导航"><img src="./assets/figma-navigation-4-1319/image_52.png" data-expanded-src="./assets/figma-navigation-4-1319/image_52.png" data-collapsed-src="./assets/figma-navigation-4-1319/image_37.png" alt=""></button>
    </aside>

    <main class="workspace">
      <section class="title-row" data-workload-section>
        <div class="title-context"><h1>工作负载</h1><i></i><button>全部工作负载<svg><use href="#i-chevron-down"/></svg></button></div>
        <div class="title-actions"><button id="restartBtn"><img class="figma-icon" src="./assets/figma-icon-library-56-38920/image_82.png" alt="">应用重启</button><button id="horizontalScaleBtn"><img class="figma-icon" src="./assets/figma-icon-library-56-38920/image_32.png" alt="">横向扩缩</button><button id="verticalScaleBtn" class="scale-vertical"><img class="figma-icon" src="./assets/figma-icon-library-56-38920/image_33.png" alt="">纵向扩缩</button><button id="actionMoreBtn" class="icon-only" aria-label="更多操作"><svg><use href="#i-more"/></svg></button></div>
      </section>

      <section class="overview" aria-label="工作负载概览" data-workload-section>
        <article class="overview-card deployment">
          <img class="overview-bg" src="./assets/figma-status-cards-196-25761/image_1.png" alt="">
          <div class="overview-content"><span>最近部署</span><strong class="deployment-status">部署完成<img src="./assets/figma-status-cards-196-25761/image_2.png" alt=""></strong></div>
        </article>
        <article class="overview-card config">
          <img class="overview-bg" src="./assets/figma-status-cards-196-25761/image_3.png" alt="">
          <div class="overview-content"><span>运行配置</span><strong>v24</strong></div>
        </article>
        <article class="resources-card">
          <div><span>CPU总量</span><strong><img src="./assets/figma-status-cards-196-25761/image_4.png" alt=""> 338<small>c</small></strong></div>
          <div><span>内存总量</span><strong><img src="./assets/figma-status-cards-196-25761/image_5.png" alt=""> 887<small>Gi</small></strong></div>
          <div><span>GPU总量</span><strong><img src="./assets/figma-status-cards-196-25761/image_6.png" alt=""> 18<small>卡</small></strong></div>
        </article>
      </section>

      <section class="data-panel workload-list-panel" data-workload-section>
        <div class="tabs-row">
          <nav class="tabs"><button class="active" data-status="all">全部Pod <b id="allCount">86</b></button><button data-status="running">运行时 <b id="runningCount">50</b></button><button data-status="error">异常 <b id="errorCount">04</b></button><button data-status="blocked">已摘流 <b id="blockedCount">02</b></button></nav>
          <div class="table-tools"><button id="collapseAllBtn" title="收起全部"><img class="figma-icon" src="./assets/figma-icon-library-56-38920/image_7.png" alt=""></button><button id="expandAllBtn" title="展开全部"><img class="figma-icon" src="./assets/figma-icon-library-56-38920/image_8.png" alt=""></button><button id="refreshBtn" title="刷新"><img class="figma-icon" src="./assets/figma-icon-library-56-38920/image_40.png" alt=""></button><i></i><div class="view-switcher" role="group" aria-label="列表展示模式"><button class="view active" data-view-mode="detailed" aria-label="详细模式" aria-pressed="true" title="详细模式"><img src="./assets/figma-icon-library-56-38920/image_29.png" alt=""></button><button class="view" data-view-mode="compact" aria-label="精简模式" aria-pressed="false" title="精简模式"><img src="./assets/figma-icon-library-56-38920/image_28.png" alt=""></button></div></div>
        </div>
        <div class="filters">
          <select id="statusSelect" aria-label="全部状态"><option value="all">全部状态</option><option value="running">运行中</option><option value="error">异常</option><option value="blocked">已摘流</option></select>
          <select id="clusterSelect" aria-label="屏蔽与接流"><option value="all">屏蔽与接流</option><option value="imeonline">imeonline</option><option value="edge-prod">edge-prod</option></select>
          <label class="pod-search"><svg><use href="#i-search"/></svg><input id="searchInput" placeholder="按实例名称或Pod IP搜索" autocomplete="off"></label>
        </div>
        <div class="cluster-groups" id="clusterGroups"></div>
        <div class="empty hidden" id="emptyState">暂无符合条件的 Pod</div>
      </section>
      <section class="app-page-placeholder hidden" id="appPagePlaceholder" aria-live="polite"><p id="appPageTitle">页面内容占位</p></section>
    </main>
  </div>

  <div class="bulk-bar hidden" id="bulkBar"><span>已选择 <b id="selectedCount">0</b> 个实例</span><div><button data-bulk-action="restart"><svg><use href="#i-power"/></svg>重启</button><button data-bulk-action="rebuild"><svg><use href="#i-refresh"/></svg>删除/重建</button><button data-bulk-action="block"><svg><use href="#i-apps"/></svg>屏蔽</button><button data-bulk-action="route"><svg><use href="#i-unfold"/></svg>接流</button><button data-bulk-action="grant"><svg><use href="#i-user"/></svg>临时授权</button><i></i><button class="danger" data-bulk-action="delete"><svg><use href="#i-apps"/></svg>删除并缩容</button><i></i><button id="clearSelectionBtn" aria-label="关闭">×</button></div></div>
  <div class="action-menu hidden" id="actionMenu" role="menu"></div>
  <section class="compact-more-popover hidden" id="compactMorePopover" aria-label="更多功能">
    <p>更多功能</p>
    <div>
      <button data-compact-more="resources"><img src="./assets/figma-compact-more-32-2945/image_9.png" alt=""><span>资源</span></button>
      <button data-compact-more="account"><img src="./assets/figma-compact-more-32-2945/image_10.png" alt=""><span>账户</span></button>
    </div>
  </section>
  <section class="env-popover hidden" id="envPopover" aria-label="切换环境">
    <label class="env-search"><img class="figma-icon" src="./assets/figma-breadcrumb-dropdown-241-37898/image_20.png" alt=""><input id="envSearchInput" type="search" placeholder="请输入应用名称" autocomplete="off"></label>
    <div class="env-popover-body">
      <nav class="env-tabs" aria-label="环境筛选">
        <button class="active" data-env-tab="all">全部环境</button>
        <button data-env-tab="recent">最近访问</button>
        <button data-env-tab="prod">生产环境</button>
        <button data-env-tab="test">测试环境</button>
      </nav>
      <div class="env-list" id="envList"></div>
    </div>
    <footer class="env-popover-footer"><button data-env-action="create"><img class="env-add-icon" src="./assets/figma-breadcrumb-dropdown-241-37898/image_26.png" alt="">新建环境</button></footer>
  </section>
  <section class="cluster-popover hidden" id="clusterPopover" aria-label="切换集群">
    <div class="cluster-search-row">
      <label class="cluster-search"><span class="cluster-search-icon" aria-hidden="true"><img src="./assets/figma-breadcrumb-dropdown-241-37898/image_48.png" alt=""><img src="./assets/figma-breadcrumb-dropdown-241-37898/image_49.png" alt=""></span><input id="clusterSearchInput" type="search" placeholder="搜索或提问..." autocomplete="off"></label>
      <button class="cluster-filter-btn" aria-label="筛选"><img class="figma-icon" src="./assets/figma-breadcrumb-dropdown-241-37898/image_52.png" alt=""></button>
    </div>
    <div class="cluster-popover-body">
      <div class="cluster-list-header"><span>全部集群 <img src="./assets/figma-breadcrumb-dropdown-241-37898/image_53.png" alt=""><img src="./assets/figma-breadcrumb-dropdown-241-37898/image_54.png" alt=""></span><span>类型</span><span>可用 / 期望副本</span></div>
      <div class="cluster-list" id="clusterList"></div>
    </div>
    <footer class="cluster-popover-footer"><button data-cluster-action="create"><span class="cluster-add-icon" aria-hidden="true"><img src="./assets/figma-breadcrumb-dropdown-241-37898/image_56.png" alt=""><img src="./assets/figma-breadcrumb-dropdown-241-37898/image_57.png" alt=""></span>绑定新集群</button></footer>
  </section>
  <section class="account-popover hidden" id="accountPopover" aria-label="切换账户">
    <label class="account-search"><svg aria-hidden="true"><use href="#i-search"/></svg><input id="accountSearchInput" type="search" placeholder="请输入账户名称" autocomplete="off"></label>
    <div class="account-popover-body">
      <nav class="account-tabs" aria-label="账户筛选">
        <button class="active" data-account-tab="all">全部可用账户</button>
        <button data-account-tab="favorite">我收藏的账户</button>
        <button data-account-tab="recent">最近访问</button>
        <button class="account-list-link" data-account-action="list">打开账户列表</button>
      </nav>
      <div class="account-list" id="accountList"></div>
    </div>
    <footer class="account-popover-footer"><button data-account-action="create">＋ 新建账户</button><button data-account-action="request">申请账户权限</button></footer>
  </section>
  <div class="modal-backdrop hidden" id="modalBackdrop">
    <section class="action-modal" id="actionModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"></section>
  </div>
  <div class="modal-backdrop hidden" id="detailBackdrop">
    <section class="instance-modal" id="instanceModal" role="dialog" aria-modal="true" aria-labelledby="instanceTitle"></section>
  </div>
  <aside class="history-drawer hidden" id="historyDrawer" aria-label="变更记录"><div class="drawer-header"><div><strong>变更记录</strong><span>最近操作</span></div><button id="closeHistoryBtn" aria-label="关闭">×</button></div><div class="history-list" id="historyList"></div></aside>
  <div class="toast" id="toast" role="status"></div>
  <script src="./app.js"></script>
</body>
</html>
